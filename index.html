const MATERIA = [{"numero": 9, "titulo": "2 Coríntios", "secoes": [{"subtitulo": "Cronologia da correspondência", "paragrafos": ["Fundação da igreja em Corinto → a Carta anterior → 1 Coríntios → a visita dolorosa → a carta com lágrimas → Envio de Tito → 2 Coríntios."], "paragrafoIds": ["p9-0-0"]}, {"subtitulo": "O relato de Tito", "paragrafos": ["Depois de visitar a igreja, Tito trouxe a Paulo duas informações principais: (1) o arrependimento genuíno da igreja; (2) a restauração da atitude da igreja em relação a Paulo."], "paragrafoIds": ["p9-1-0"]}, {"subtitulo": "Os opositores de Paulo em 2 Coríntios", "paragrafos": ["Há um indivíduo opositor e dois grupos de opositores. Entre eles, o alvo contra o qual Paulo luta de forma mais intensa é o segundo grupo, os \"superapóstolos\".", "1. \"O injusto\" (7:12)", "2. Uma minoria de membros da igreja que continuava a se opor a Paulo", "3. \"Os superapóstolos\"", "a. Plural — τῶν ὑπερλίαν ἀποστόλων (os extremamente (grandioso) apóstolos) (11:5). Simplesmente, \"superapóstolos\".", "b. Não parecem ser judaizantes. A circuncisão ou a observância da Lei não era o foco deles. Ao contrário de Gálatas, quase não há sinais de que eles estivessem impondo a Lei.", "c. Eles atacaram a autoridade apostólica de Paulo para garantir sua própria autoridade e influência sobre a igreja. Eles alegavam ser os verdadeiros apóstolos e superiores a Paulo. Segundo eles: i. Paulo é fraco; nas suas cartas ele parece forte, mas quando encontrar pessoalmente ele não tem muita importância (10:10). ii. Um verdadeiro apóstolo deveria possuir eloquência, carisma, experiências espirituais extraordinárias e sucesso ministerial. No entanto, segundo eles, Paulo não é considerado como um verdadeiro apóstolo por causa de seus sofrimentos, pobreza e falta de habilidade retórica. iii. Eles tinham cartas de recomendação (3:1), mas Paulo não. Observação: uma implicação das cartas de recomendação — eles eram as pessoas de fora.", "d. Eles tentaram dominar a igreja. Paulo revelou que eles a oprimiam e exploravam, tentando colocá-la sob sua própria influência (2Co 11:20).", "e. Suas habilidades retóricas eram excelentes.", "f. Mostraram uma combinação de formação judaica + retórica helenística — não eram filósofos totalmente gentios, nem judaizantes puros. Evidência: 1) Paulo fala, \"(eles) são hebreus? Eu também sou\" (11:22) → indica identidade judaica deles. ii) Demonstravam eloquência, sucesso externo e exibição de autoridade, refletindo o estilo de \"elites retóricos\" da cultura greco-romana.", "g. Líderes carismáticos do tipo \"exibição de poder espiritual\" — Eles enfatizavam visões, poderes e manifestações extraordinárias. O fato de Paulo mencionar \"visões e revelações\" no capítulo 12 se deve justamente ao fato de que seus oponentes baseavam sua autoridade nesse tipo de experiência.", "h. O que eles afirmavam: i. \"Um verdadeiro apóstolo deve ser forte e bem-sucedido\" — para eles, o sofrimento era evidência de fracasso. Aquele que faz o ministério de Deus deveria ser forte e bem-sucedido. A fraqueza seria prova de que a pessoa não é de Deus. ii. \"Autoridade externa e cartas de recomendação são essenciais\" — eles enfatizavam a validação humana (cartas de recomendação, origem, status). Paulo, porém, não buscava esse tipo de validação, e por isso o atacavam nesse ponto. iii. \"Habilidade retórica = autoridade\" — Para eles, autoridade espiritual é obtida por meio da capacidade retórica de vencer debates e persuadir outros. Falar bem era lhes essencial. Na visão deles, Paulo era \"fraco na palavra\" (10:10)."], "paragrafoIds": ["p9-2-0", "p9-2-1", "p9-2-2", "p9-2-3", "p9-2-4", "p9-2-5", "p9-2-6", "p9-2-7", "p9-2-8", "p9-2-9", "p9-2-10", "p9-2-11"]}, {"subtitulo": "O falso evangelho dos superapóstolos", "paragrafos": ["Na 2 Coríntios, o \"falso evangelho\" pregado pelos superapóstolos não é apresentado de forma explícita, mas pode-se saber a respeito deles por meio de uma leitura em espelho das palavras de Paulo sobre eles.", "1. \"Outro Jesus… outro espírito… outro evangelho\" (2 Coríntios 11:4) — não se trata de uma pequena diferença, mas de um evangelho essencialmente diferente.", "2. O falso evangelho pode ser chamado de um \"evangelho do sucesso e da glória\" (Capítulos 10–13:1), porque dizia que o verdadeiro seguidor de Jesus deve ser forte e bem-sucedido. Deve ter autoridade, poder e reconhecimento externo. Sua performance deve ser acompanhada com milagres, visões, carisma e eloquência. Esses elementos tornam-se critério de autenticidade espiritual. Para eles, fraqueza é fracasso, sofrimento é problema.", "Eles falavam de Jesus, mas alteravam o significado da cruz e distorciam o evangelho. O evangelho que eles pregavam não enfatizava Jesus quem foi humilhado e sofreu para cumprir o plano salvador de Deus. Mas enfatizava que a salvação traz sucesso, poder, prosperidade e reconhecimento. É um \"evangelho de glória sem Jesus sofredor e obediente\", uma leitura do evangelho baseada em critérios seculares de sucesso e poder."], "paragrafoIds": ["p9-3-0", "p9-3-1", "p9-3-2", "p9-3-3"]}, {"subtitulo": "Os problemas dos destinatários e as respostas de Paulo", "paragrafos": ["1) Dúvida sobre a autoridade apostólica de Paulo — Algumas pessoas dentro da igreja não reconheciam a autoridade apostólica de Paulo. Criticavam Paulo por causa de sua fraqueza, sofrimentos, falta de habilidade retórica e ausência de autoridade externa (2Co 10:10). <strong>A resposta de Paulo</strong>: \"Minha fraqueza é o verdadeiro sinal de um apóstolo autêntico.\" As pessoas olham para aparência, eloquência e força, mas Paulo enfatiza que o poder de Cristo se manifesta no sofrimento e na fraqueza (12:9–10).", "2) Os superapóstolos — Eles estavam ostentando sua autoridade e poder, e confundindo a igreja de Corinto com um falso evangelho. A igreja não estava conseguindo resistir a isso com base no evangelho de Paulo e na tradição apostólica, mas estava tolerando, sendo influenciada e aceitando essa situação (11:20). <strong>A resposta de Paulo</strong>: \"Eles não são apóstolos de Cristo, mas pessoas que enganam a si mesmas e se disfarçam.\" \"O próprio Satanás se transforma em anjo de luz\" (11:14). Sua aparência de brilho e poder não é evidência de autenticidade. O verdadeiro evidência é: sofrimento ao servir a Deus e dependência de Deus em sua fraqueza.", "3) A tensão entre Paulo e a igreja de Corinto — Após a visita dolorosa de Paulo e o envio da sua carta severa, havia tensão entre ele e a igreja. Havia os membros da igreja que criticavam e duvidavam de sua autoridade apostólica e de seus ensinamentos e também os membros que seguiam Paulo. A igreja dividiu-se por causa das diferenças de opinião em relação a Paulo. <strong>A resposta de Paulo</strong>: \"Minha firmeza não tem o propósito de vos destruir, mas de vos edificar a igreja em amor\". Ele afirma que escreveu a carta \"com muitas lágrimas\" (2:4). O objetivo dela era o arrependimento da igreja e a restauração do relacionamento entre ele e a igreja toda. Ele exorta para que a igreja não se divida por causa das opiniões sobre ele.", "4) Falta de maturidade espiritual — A igreja de Corinto tendia a valorizar poder externo, liderança carismática e habilidades retóricas. Por isso, não conseguia compreender adequadamente o ministério humilde e o apostolado marcado pelo sofrimento de Paulo. <strong>A resposta de Paulo</strong>: \"O poder de Deus não se manifesta na grandiosidade, mas na fraqueza\" (12:9). Ele inverte completamente os critérios de avaliação: a aparência externa e o brilho não são sinais de autenticidade apostólica. O verdadeiro ministério é aquele no qual o poder de Deus se manifesta no meio do sofrimento. Em outras palavras, o critério do verdadeiro ministério não é a capacidade externa, mas o poder de Deus revelado na fraqueza.", "5) A questão da oferta para a igreja de Jerusalém — Nos capítulos 8–9 Paulo exorta a igreja de Corinto a completar a coleta destinada à igreja de Jerusalém. A igreja de Corinto havia prometido contribuir, mas ainda não havia cumprido o compromisso. <strong>A resposta de Paulo</strong>: \"Concluam com alegria aquilo que já começaram.\" \"Cada um contribua, não por obrigação, mas com alegria\" (9:7). Paulo ensina que a oferta não é uma obrigação, mas um ministério de graça que deve ser completado com alegria."], "paragrafoIds": ["p9-4-0", "p9-4-1", "p9-4-2", "p9-4-3", "p9-4-4"]}]}, {"numero": 10, "titulo": "Romanos", "secoes": [{"subtitulo": "Posição mais sólida sobre a data", "paragrafos": ["Data precoce (54 d.C.) e data tardia (57/58 d.C.) usam pontos de referência diferentes: Data precoce — a posse de Gálio como procônsul de Corinto. Data tardia — a posse de Festo como procurador/governador romano da Judeia.", "O consenso acadêmico considera o ano da posse de Gálio (51 d.C.) como um ponto de referência muito mais confiável do que o ano da posse de Festo. A razão é que a base cronológica de Gálio é sustentada por evidência epigráfica externa, direta e datável, enquanto a base cronológica de Festo depende mais de reconstruções históricas indiretas e intervalos aproximados. Por isso, qualquer cronologia séria de Paulo precisa começar por Gálio e depois ajustar o restante dos eventos.", "Conclusão: Romanos teria sido escrito no final da terceira viagem missionária, possivelmente em 54 d.C., quando Paulo permaneceu três meses em Corinto."], "paragrafoIds": ["p10-0-0", "p10-0-1", "p10-0-2"]}, {"subtitulo": "A igreja tinha dois problemas", "paragrafos": [], "paragrafoIds": ["p10-1-0"]}, {"subtitulo": "1. Tensões entre cristãos judeus e cristãos gentios", "paragrafos": ["As tensões na igreja de Roma não eram meros desentendimentos pessoais, mas sim um conflito profundo de identidade enraizado em eventos históricos e divergências teológicas. O ponto de ruptura foi um evento político externo: o imperador Cláudio expulsou todos os judeus de Roma devido a tumultos causados por um tal \"Chrestus\" (provavelmente uma referência a Cristo). A consequência foi os líderes judeus influentes, como Áquila e Priscila, terem que abandonar a cidade. Durante os anos de ausência dos judeus, a igreja tornou-se predominantemente gentílica. Os cristãos gentios desenvolveram sua própria liderança e costumes, independentes das tradições judaicas.", "Mas, com a morte de Cláudio e a ascensão de Nero, o édito perdeu a força e os cristãos judeus começaram a retornar a Roma. Os judeus que voltavam queriam manter suas tradições (sábado, circuncisão, leis dietéticas), mas encontraram uma igreja que já não via necessidade dessas práticas. Surgiu, então, um debate sobre quem detinha a \"verdadeira\" herança da fé. Os judeus apelavam para a sua eleição histórica como povo de Deus, enquanto os gentios orgulhavam-se de sua liberdade em Cristo."], "paragrafoIds": ["p10-2-0", "p10-2-1"]}, {"subtitulo": "2. As Facções: \"Fortes\" vs. \"Fracos\"", "paragrafos": ["Paulo aborda diretamente essa tensão (Romanos 14–15), dividindo os grupos em termos pastorais: 1) Os \"fracos\" (geralmente judeus cristãos). Eles sentiam-se obrigados a guardar dias sagrados e a evitar carnes que poderiam ter sido sacrificadas a ídolos (preferindo vegetais). Tendiam a julgar os gentios como pecadores ou irreverentes.", "Agora, os \"fortes\" (geralmente gentios-cristãos) compreendiam que, em Cristo, todos os alimentos eram puros e todos os dias eram iguais. Tendiam a desprezar os judeus como pessoas limitadas e legalistas.", "Então tinha dois problemas independentes? No nível superficial tem dois problemas. Mas, na prática, eles se sobrepõem. Ou seja, o conflito entre fortes e fracos pode ser a manifestação concreta da tensão entre judeus e gentios da igreja."], "paragrafoIds": ["p10-3-0", "p10-3-1", "p10-3-2"]}, {"subtitulo": "O que Paulo diz aos dois grupos", "paragrafos": ["Sobre os fracos: 1) à igreja — \"Recebei ao que é fraco na fé, não para discutir opiniões\" (14:1). Paulo explica que os fracos na fé não devem ser excluídos da comunidade. Sua consciência não deve ser condenada. Ou seja, dentro da igreja ninguém deve ser rejeitado por causa da \"fraqueza\" na fé. 2) aos próprios fracos — Paulo ensina que devem viver de acordo com sua consciência diante de Deus, mas ao mesmo tempo avançar gradualmente para a liberdade do reino de Deus e crescer na fé.", "Aos fortes: 1) \"Quem come não despreze os que não comem\" (14:3). Ter liberdade não significa ser superior. Maturidade espiritual não é sinônimo de superioridade. 2) \"Não ponhais tropeço ou escândalo ao irmão\" (14:13). Paulo não está anulando a liberdade do evangelho, mas ensinando que a liberdade deve ser moderada pelo amor. Em outras palavras, tua liberdade pode estar correta. Porém, usá-la sem amor está errado. Pense em Cristo, quem não agradou a Si mesmo (15:3). O padrão do cristão não é a própria liberdade, mas Jesus Cristo.", "Para os dois grupos: a mensagem central são: 1) A essência do reino de Deus — o reino de Deus não é comida nem bebida, mas justiça, paz e alegria (14:17). Ou seja, a questão dos alimentos não é essencial. A questão dos dias também não. 2) Edificai-vos mutuamente — \"Sigamos as coisas da paz e as da edificação mútua\" (14:19). 3) O propósito da liberdade é amor — liberdade cristã existe para servir ao amor."], "paragrafoIds": ["p10-4-0", "p10-4-1", "p10-4-2"]}, {"subtitulo": "Diatribe", "paragrafos": ["Paulo conhecia a retórica grega e utilizou diatribe como forma de comunicação eficaz. Diatribe é um estilo de argumentação da retórica antiga no qual o autor dialoga com um oponente imaginário, fazendo perguntas e respondendo a elas para desenvolver seu argumento."], "paragrafoIds": ["p10-5-0"]}]}, {"numero": 11, "titulo": "Colossenses", "secoes": [{"subtitulo": "Os problemas dos destinatários e as respostas de Paulo", "paragrafos": ["A fonte dos problemas da igreja era a presença de ensinamentos heréticos que obscureciam as verdades do evangelho e causavam confusão espiritual e doutrinal na igreja. Seguem os ensinamentos heréticos:", "1. Jesus era visto apenas como um ponto de partida, mas não como suficiente para a salvação e maturidade religiosa. Por isso, defendia-se uma espécie de \"Cristo + outras coisas\". Havia uma desvalorização de Cristo.", "Essa visão em seguida levava à adoção de regras adicionais e práticas ascéticas. Observância de alimentos, festas religiosas e práticas de autocontrole rigoroso eram consideradas necessárias para atingir um nível espiritual superior.", "Havia também a ênfase em experiências espirituais extraordinárias, como visões, culto a anjos e práticas místicas. Essas experiências eram consideradas sinais de um estágio espiritual mais avançado, enquanto a simples fé em Cristo era vista como algo \"básico\".", "Nesse contexto, o problema central em Colossos não era apenas moral ou comportamental, mas profundamente teológico: a ideia de que Cristo não era suficiente."], "paragrafoIds": ["p11-0-0", "p11-0-1", "p11-0-2", "p11-0-3", "p11-0-4"]}, {"subtitulo": "A resposta de Paulo (1. Desvalorização de Cristo)", "paragrafos": ["1. \"E estais perfeitos nEle, …\" (2:10). Os crentes foram completados nele. Não precisam de outras coisas além da cruz para ser salvo e ser o povo de Deus.", "2. Toda a plenitude habita em Cristo (1:19, 2:9). Significa que não é necessário nenhum outro ser espiritual além de Cristo para a salvação, não existem níveis intermediários necessários para aproximar-se de Deus, e a plenitude divina não está distribuída em vários seres espirituais, mas habita totalmente em Cristo. Portanto, Cristo é plenamente suficiente.", "3. O \"poder e autoridade\" (NVI) (ἀρχαί, ἐξουσίαι) em 2:10 referem-se aos poderes espirituais que existem entre Deus e os homens. Paulo declara que Cristo está acima de todos eles (1:16, 2:10, 15). Assim, a alta cristologia de Colossenses não é doutrina abstrata, mas uma resposta direta aos falsos ensinamentos aos Colossenses."], "paragrafoIds": ["p11-1-0", "p11-1-1", "p11-1-2"]}, {"subtitulo": "2. Influência de falsos mestres", "paragrafos": ["Havia pessoas abalando a igreja com filosofia, um engano vazio que parece plausível, mas na realidade não tem substância nem verdade, apenas são tradições humanas e princípios elementares do mundo. Os colossenses corriam risco de serem atraídos por esses e alguns deles já foram atraídos.", "<strong>A resposta de Paulo</strong> — Paulo adverte, \"Cuidado para que ninguém vos escravize por meio de filosofias e enganos vazios...\" (2:8). Isso não significa rejeição total da herança de sabedoria da humanidade, mas crítica a sistemas centrados no homem e separados de Cristo. Paulo desmascara a verdadeira natureza das filosofias e dos ensinamentos enganosos: eles veem das tradições humanas. Em outras palavras, não vinham da revelação divina, mas do entendimento alcançado pelo ser humano. Apenas é um sistema de conhecimento e afirmações do ser humano sem garantia de ser verdadeiro. É absolutamente preciso distinguir entre as afirmações humanas e as revelações divinas."], "paragrafoIds": ["p11-2-0", "p11-2-1"]}, {"subtitulo": "3. Condenação legalista", "paragrafos": ["Havia julgamentos baseados em comida, festas religiosas e sábado. A espiritualidade dos colossenses era medida por regras externas.", "<strong>A resposta de Paulo</strong> — Em 2:16-17, Paulo lhes orienta que não aceitem ser avaliados quanto à sua condição espiritual com base em regras externas como alimentos, festas ou o sábado. Pois, a realidade é Cristo, e a comida, as festas e o sábado são apenas sombras que apontavam para Ele. Agora que Cristo veio, não há necessidade de serem novamente presos a essas sombras e julgados por elas. O verdadeiro critério é se vocês seguem Cristo e se estão sendo transformados à Sua semelhança."], "paragrafoIds": ["p11-3-0", "p11-3-1"]}, {"subtitulo": "4. Misticismo e culto aos anjos", "paragrafos": ["Alguns davam atenção excessiva a anjos, a visões e ao mundo espiritual invisível, tratando tais elementos como um nível mais alto de espiritualidade do que a fé simples em Cristo.", "<strong>A resposta de Paulo</strong> — Paulo considera que a obsessão de alguns membros da igreja de Colossos com a adoração de anjos, de visões e do mundo invisível espiritual é uma tentativa de estabelecer uma hierarquia de fé com base em experiências espirituais. Simplesmente Paulo exorta os leitores originais rejeitar isso. Aqueles que buscam tais coisas podem parecer, à primeira vista, pessoas muito espirituais, mas na realidade estão dominados por uma mentalidade carnal. O verdadeiro crente não é definido por experiências espirituais, mas por estar unido a Cristo. Em outras palavras, trata-se de reconhecer Cristo como cabeça, estar conectado a Ele e viver submetido ao Seu senhorio na vida prática, sendo esse o verdadeiro critério (2:19)."], "paragrafoIds": ["p11-4-0", "p11-4-1"]}, {"subtitulo": "5. Ascetismo confundido com espiritualidade", "paragrafos": ["Havia uma rigidez religiosa ascética expressa em regras como \"não toque, não prove e não manuseie\", baseadas na ideia de que a santidade espiritual era alcançada por meio da abstinência e de restrições externas.", "<strong>A resposta de Paulo</strong> — As práticas ascéticas pareciam piedade, mas focava mais em regras externas do que em transformação interior. Paulo reconhece que tais práticas podiam parecer piedosas, atraentes e sábias externamente, porém não tinham poder real para vencer a natureza pecaminosa (2:23)."], "paragrafoIds": ["p11-5-0", "p11-5-1"]}, {"subtitulo": "6. Confusão de identidade comunitária", "paragrafos": ["Na igreja de Colossos, havia judeus e gentios, livres e escravos, homens e mulheres. No contexto do Império Romano, essas distinções eram parte de um sistema social extremamente rígido e hierárquico, de modo que essa mistura dentro de uma comunidade era um fenômeno bastante radical, ou seja, profundamente inovador.", "No contexto do Império Romano, as fronteiras entre as classes sociais eram bastante fortes, e a interação entre diferentes níveis sociais era limitada. Havia grande distância social e jurídica entre livres e escravos, nobres e plebeus e ricos e pobres. É verdade que conviviam nos mesmos mercados e cidades, mas isso não significava relacionamentos de igualdade ou aceitação mútua como membros da mesma comunidade.", "Cada grupo vinha de um universo de valores diferente. Os judeus eram centrados na Lei, os gentios viviam em um contexto politeísta greco-romano, os livres tinham consciência de direitos e status social, e os escravos estavam inseridos numa estrutura de obediência e submissão. Nesse contexto, havia o perigo de que a nova identidade cristã fosse novamente substituída pelas identidades de origem (etnia, classe social e gênero). Em alguns casos, isso poderia até gerar divisões, quando certos grupos reivindicavam superioridade e distinções sociais seculares até mesmo dentro da igreja em relação aos outros.", "<strong>A resposta de Paulo</strong> — Afirma que \"em Cristo não há judeu nem grego, escravo nem livre\", reafirmando que o centro da identidade da igreja deve permanecer em Cristo e não nas distinções sociais ou culturais. Ou seja, a resposta para a pergunta \"Quem sou eu?\" passa a ser, \"Eu sou uma pessoa em Cristo, ligada a Cabeça, e vivo por Ele\" (3:11)."], "paragrafoIds": ["p11-6-0", "p11-6-1", "p11-6-2", "p11-6-3"]}, {"subtitulo": "7. Necessidade de mudança de vida", "paragrafos": ["Havia problemas éticos na igreja de Colossos: imoralidade sexual, impureza, paixão desordenada, avareza, ira, maldade, mentira, indignação, blasfêmia, linguagem obscena (3:5–9).", "<strong>A resposta de Paulo</strong> — Em 3:5–10, Paulo não se limita a dizer simplesmente \"corrijam esses problemas éticos\" (como imoralidade sexual, avareza, ira, mentira etc.), mas exige uma ruptura radical baseada na mudança de identidade. Ele afirma: \"Vocês já não pertencem ao velho homem. Portanto, abandonem o antigo modo de vida (imoralidade sexual, avareza, ira, mentira etc.) e vivam de acordo com o novo homem que já são em Cristo.\""], "paragrafoIds": ["p11-7-0", "p11-7-1"]}, {"subtitulo": "Data e local", "paragrafos": ["A maioria dos estudiosos data a carta entre 60–62 d.C., durante o primeiro encarceramento de Paulo em Roma, embora alguns proponham uma datação entre 58–60 d.C. Com base em Atos 18:12 e na inscrição de Delfos, qual datação seria mais aceitável?"], "paragrafoIds": ["p11-8-0"]}, {"subtitulo": "Notas exegéticas — 1:13, o reino do Filho", "paragrafos": ["\"Reino\" = βασιλεία → governo, domínio real. O sentido primário é ato de governar; o secundário é esfera onde esse governo se exerce. Somente quando o primário não faz sentido, entendam seu sentido como o secundário. Nesse versículo significa a esfera sob o governo de Jesus Cristo.", "A expressão \"assentou-se à direita do trono de Deus\" reúne, em uma única fórmula, a exaltação de Jesus, seu governo real, a consumação da obra redentora e sua soberania presente. Trata-se de uma expressão cristológica que surgiu após a ressurreição, ascensão e exaltação de Jesus, mostrando o desenvolvimento da cristologia da igreja primitiva. Nessa altura do desenvolvimento da cristologia aparece a expressão, o reino do Filho."], "paragrafoIds": ["p11-9-0", "p11-9-1"]}]}, {"numero": 12, "titulo": "Efésios", "secoes": [{"subtitulo": "Autoria", "paragrafos": ["Cartas paulinas indiscutidas: Romanos, 1 Coríntios, 2 Coríntios, Gálatas, Filipenses, 1 Tessalonicenses e Filemom.", "Em conclusão, entre os argumentos apresentados pelos defensores da autoria paulina, o principal é o fato de que a igreja primitiva reconheceu Efésios como uma carta de Paulo. Por isso, eles enfatizam que a igreja primitiva a recebeu de maneira muito consistente como uma carta paulina.", "Já a posição crítica entende que a percepção da igreja primitiva é importante, mas não decisiva. A análise do estilo e da teologia presente na carta é mais importante. Assim, ao analisar o estilo literário e a teologia da carta, muitos críticos consideram mais provável que ela tenha sido escrita por alguém da escola paulina ou por um discípulo de Paulo."], "paragrafoIds": ["p12-0-0", "p12-0-1", "p12-0-2"]}, {"subtitulo": "Os problemas dos destinatários", "paragrafos": ["Os problemas que Paulo aborda na carta não eram exclusivos de uma única congregação, mas desafios comuns enfrentados pelas comunidades cristãs da Ásia Menor."], "paragrafoIds": ["p12-1-0"]}, {"subtitulo": "1. Tensão entre cristãos judeus e cristãos gentios", "paragrafos": ["Este é o problema mais representativo. Embora a igreja primitiva tenha começado centrada nos judeus, o número de convertidos gentios cresceu rapidamente na Ásia Menor. Consequentemente, as igrejas eram mistas, ou seja, compostas por judeus e gentios. Surgiram as seguintes questões dentro da igreja: 1) Circuncisão é necessária? 2) A observância da Lei é necessária? 3) As restrições alimentares devem ser seguidas? 4) Somos o povo de Deus mesmo sem as tradições judaicas? Como havia divergências em aspectos fundamentais, isso se manifestava em vários problemas superficiais, frequentemente resultando em tensão e conflito entre os dois grupos.", "Embora seja altamente provável que a igreja de Éfeso tenha lido a carta aos Romanos, as questões mencionadas anteriormente continuaram a surgir devido aos seguintes motivos:", "1) Romanos era o \"Gabarito\", mas a vida era o \"Problema aplicado\" — É fato que a carta aos Romanos apresentou princípios claros, como \"a verdadeira circuncisão é a do coração\" e \"a salvação é pela graça, não pela lei\". No entanto, ler esta carta não mudaria da noite para o dia a identidade judaica e os hábitos culturais dos gentios construídos ao longo de séculos. Saber a teoria é diferente de aplicá-la à vida. A área em que esse problema se manifestava de forma mais evidente era justamente o modo de vida moldado pela tradição, isto é, a esfera cultural.", "2) Conflito entre o Evangelho como \"teoria\" e a tradição como \"cultura\" — Para os crentes judeus, a Lei e as restrições alimentares não eram apenas regras, mas um estilo de vida. Mesmo que compreendessem intelectualmente, através de Romanos, que a circuncisão não era essencial para se tornarem povo de Deus, tornar-se um só corpo (igreja) e conviver como família com gentios incircuncisos era um enorme choque cultural aos cristãos judeus. Consequentemente, perguntas fundamentais sobre a identidade, como \"Somos realmente o povo perfeito de Deus sem as tradições judias?\", continuavam a surgir.", "3) Ataques contínuos dos Judaizantes — As epístolas de Paulo não eram as únicas a circular. Falsos mestres conhecidos como Judaizantes viajavam de igreja em igreja, confundindo os fiéis ao alegar que \"para ser verdadeiramente salvo, é preciso viver como um judeu, mesmo crendo em Jesus\". Os santos de Éfeso, que sentiam confiança ao ler Romanos, caíam em dúvida novamente quando esses agitadores chegavam, perguntando-se: \"Será que realmente não precisamos ser circuncidados?\"."], "paragrafoIds": ["p12-2-0", "p12-2-1", "p12-2-2", "p12-2-3", "p12-2-4"]}, {"subtitulo": "2. Confusão sobre a identidade da igreja", "paragrafos": ["Sociologicamente falando, a igreja de Éfeso era um grupo minoritário da sociedade greco-romana. Sem um entendimento firme da identidade e missão cristã, as seguintes dúvidas surgiriam entre os santos: 1) Somos uma seita do Judaísmo? 2) Somos apenas mais uma entre as novas religiões? 3) A igreja tem prioridade sobre a família? 4) Como conciliar os deveres cívicos com a fé?", "Os leitores originais não compreendiam plenamente que a igreja era uma comunidade nova, sem precedentes na história da humanidade. Não entendiam claramente que eram uma comunidade destinada a adorar a Deus, herdar o Seu reino, receber o \"bastão\" do ministério de Jesus e fazer o mesmo ministério de Jesus até o Seu retorno."], "paragrafoIds": ["p12-3-0", "p12-3-1"]}, {"subtitulo": "3. A economia centrada na idolatria e a perseguição social", "paragrafos": ["Na antiga Éfeso, havia o Templo de Ártemis, e o culto a esta deusa era o cerne da identidade e um pilar econômico da cidade. Devido a essa religião, os peregrinos visitavam regularmente a cidade, e os artesãos (especialmente fabricantes de ídolos) e comerciantes ganhavam dinheiro. Atos 19 relata o incidente de Demétrio que demonstra como o culto a Ártemis era o centro da estrutura econômica urbana.", "Como o culto a Ártemis desempenhava um papel vital, as guildas, formadas em torno dessa religião, a apoiavam e protegiam para garantir seus próprios lucros. Inicialmente, essas guildas demonstravam indiferença ou uma atitude ambivalente em relação à igreja de Éfeso, mas com o tempo, passaram a vê-la como uma \"ameaça econômica e religiosa\", tornando-se cada vez mais hostis.", "Essa relação hostil entre as guildas e a igreja de Éfeso não se limitava a Éfeso; deve ser vista como um \"conflito estrutural\" encontrado em toda a Ásia Menor. Isso porque o culto a Ártemis não era um fenômeno exclusivo de Éfeso, mas amplamente difundido por toda a região. As guildas, que protegiam a idolatria, e os cristãos, que a rejeitavam, entravam em conflito nas principais cidades da Ásia Menor.", "Em Éfeso, os cristãos que não participavam do culto a Ártemis eram percebidos como uma \"ameaça\" econômica, um \"grupo não cooperativo\" socialmente e \"ímpios\" religiosamente. No exemplo de Atos 19, Demétrio incitou o povo alegando: \"Paulo diz que deuses feitos por mãos humanas não são deuses\". Os comerciantes se opuseram a Paulo, gritando: \"Grande é a Ártemis!\", iniciando um tumulto motivado pela percepção de que \"este homem está ameaçando o nosso sustento\".", "Basicamente a sociedade helenística era politeísta. Por isso, os cristãos, que insistiam na fé em um Deus único e colidiam com a ordem sociorreligiosa politeísta, eram vistos como um \"grupo religioso bizarro\". Aos olhos deles, os cristãos desfrutavam dos privilégios do Império Romano, mas eram indiferentes ou, às vezes, contrários ao culto imperial e aos eventos comunitários importantes, sendo rotulados como uma força antissocial que não cumpria seus deveres cívicos básicos. Como resultado, embora nem sempre houvesse perseguição violenta, os cristãos sofriam desprezo, distanciamento social, desvantagens econômicas e exclusão coletiva."], "paragrafoIds": ["p12-4-0", "p12-4-1", "p12-4-2", "p12-4-3", "p12-4-4"]}, {"subtitulo": "4. O medo dos poderes espirituais", "paragrafos": ["No mundo politeísta da Antiguidade, era comum a ideia de que, se alguém ignorasse ou insultasse os deuses, poderia sofrer sua ira e punição, e Ártemis também estava dentro dessa categoria. Por exemplo, Acteão foi transformado em cervo e morreu por ter visto Ártemis tomando banho, enquanto Níobe perdeu seus filhos por ter desprezado a deusa com arrogância.", "Nesse ambiente, Éfeso e outras cidades da Ásia Menor possuíam uma forte cultura de magia, medo espiritual e visão de mundo politeísta. Devido à falta de compreensão do mundo espiritual na perspectiva cristã, os crentes imaturos (νήπιοι) compartilhavam o mesmo medo de seres espirituais invisíveis que seus vizinhos incrédulos tinham."], "paragrafoIds": ["p12-5-0", "p12-5-1"]}, {"subtitulo": "5. A vida não cristã dos próprios cristãos", "paragrafos": ["Devido a razões econômicas, falta de ensino cristão, medo de seres espirituais, influência do estilo de vida dos vizinhos incrédulos e a falta de unidade por causa de conflitos internos da igreja, os leitores originais tinham dificuldade e não tinham coragem de abandonar o estilo de vida anterior à conversão. Persistiam problemas como imoralidade sexual, relações injustas entre escravos e senhores, ordens patriarcais rígidas, ira, violência, mentira e ganância etc.", "Em resumo, as igrejas da Ásia Menor, incluindo a de Éfeso, enfrentavam o desafio de confessar apenas Jesus como Senhor em uma sociedade multicultural, formar uma comunidade cristã verdadeira sem divisões entre judeus e gentios, e viver com uma nova identidade em uma sociedade idólatra. No entanto, eles ainda eram espiritualmente crianças (νήπιοι). Embora tivessem se tornado crentes, ainda não tinham sucesso em viver como discípulos de Jesus. Foi por isso que Paulo tomou a pena para escrever."], "paragrafoIds": ["p12-6-0", "p12-6-1"]}, {"subtitulo": "Estrutura", "paragrafos": ["Abertura — 1:1–2. Encerramento — 6:21–24. Corpo — 1:3–6:20.", "De uma perspectiva ampla, o corpo da carta divide-se em duas partes: 1) 1:3–3:21 trata daquilo que Deus constituiu a Igreja para ser; 2) 4:1–6:20 foca no 'portanto' — Portanto, como a Igreja deve viver a partir dessa realidade."], "paragrafoIds": ["p12-7-0", "p12-7-1"]}, {"subtitulo": "\"As ciladas do diabo\"", "paragrafos": ["Por que Paulo menciona as \"ciladas\" do diabo? Porque a batalha espiritual consiste essencialmente nisto: Satanás engana, enquanto o povo de Deus resiste ao engano satânico por meio das verdades reveladas pelo Filho e pelo Espírito Santo.", "O significado de μεθοδεία (\"cilada\", \"astúcia\") — A palavra μεθοδεία ajuda a compreender como o diabo atua. Ela é formada por: μετά = \"seguindo\" e ὁδός = \"caminho\", \"método\". Assim, a ideia é de um método planejado, estratégico e sistemático para alcançar determinado objetivo.", "Pergunta: O que é necessário para não cair no engano e mentira? Resposta: Saber as verdades e discernir e combater as mentiras."], "paragrafoIds": ["p12-8-0", "p12-8-1", "p12-8-2"]}]}, {"numero": 13, "titulo": "Filipenses", "secoes": [{"subtitulo": "Problemas da igreja e as respostas de Paulo", "paragrafos": ["Embora a Carta aos Filipenses mantenha um tom afetuoso e positivo, Paulo aborda três problemas que a igreja enfrentava. Para resolvê-los, apresenta alegria e humildade como as soluções fundamentais."], "paragrafoIds": ["p13-0-0"]}, {"subtitulo": "1. Dissensões e conflitos internos", "paragrafos": ["Na carta, Paulo exorta Evódia e Síntique a \"terem o mesmo modo de pensar no Senhor\" (4:2). Também exorta toda a igreja a evitar rivalidade e vanglória (2:3), a ter o mesmo amor e o mesmo propósito (1:27; 2:2) e a considerar os outros superiores a si mesmos (2:3–4). Paulo afirma que algumas pessoas \"buscam os seus próprios interesses\" (2:21). Tudo isso mostra que havia na igreja de Filipos algum tipo de desentendimento, tensão e atitudes egoístas. Infelizmente, não sabemos exatamente o que foi o texto, o conteúdo exato dos conflitos, sua dimensão, suas causas, nem o grau de gravidade.", "<strong>A resposta de Paulo</strong> — Paulo exorta os destinatários a terem \"o mesmo modo de pensar no Senhor\" (4:2), a permanecerem \"firmes em um só espírito, lutando juntos pela fé do evangelho\" (1:27), a terem \"o mesmo amor, o mesmo ânimo e o mesmo propósito\" (2:2), a não fazerem nada \"por rivalidade ou vanglória\" (2:3), a considerarem os outros superiores a si mesmos (2:3–4) e a buscarem os interesses de Cristo, não apenas os próprios interesses (2:21). Assim, Paulo chama a igreja à unidade, humildade e cooperação no evangelho."], "paragrafoIds": ["p13-1-0", "p13-1-1"]}, {"subtitulo": "2. Perseguição", "paragrafos": ["Os cristãos de Filipos sofriam pressões sociais e sofrimentos por viverem como seguidores de Cristo em uma cidade de forte cultura imperial romana. Embora não seja possível saber exatamente que tipo de perseguição a igreja de Filipos sofreu, existem alguns indícios importantes.", "1) Filipos era uma colônia romana, e seus habitantes tinham grande orgulho de sua identidade romana. Em Atos 16, os acusadores disseram a respeito de Paulo e seus companheiros: \"Estes homens estão perturbando a nossa cidade... e pregam costumes que nós, sendo romanos, não podemos aceitar\" (At 16:20-21). Isso sugere que o evangelho era visto como uma ideia estrangeira que entrava em conflito com os valores e costumes romanos, o que poderia levar à rejeição e à perseguição dos cristãos.", "2) Razões políticas também podem ter contribuído para a perseguição. Como Filipos era uma colônia romana, a lealdade a Roma era altamente valorizada. Nesse contexto, confessar que \"Jesus é o Senhor\" não era apenas uma declaração religiosa. Tal confissão podia ser entendida como a afirmação de que a autoridade suprema pertence a Cristo, e não ao imperador romano. Isso provavelmente despertava resistência, hostilidade e suspeitas por parte daqueles que consideravam a lealdade ao Império Romano um valor fundamental.", "<strong>A resposta de Paulo</strong> — Afirma que sofrer por Cristo faz parte da vida cristã (1:29), os crentes devem viver \"de modo digno do evangelho\" (1:27), não ter medo dos opositores (1:28), seguir o exemplo de humildade e obediência de Cristo (2:5–11) e lembrar que sua verdadeira cidadania está nos céus, não no Império Romano (3:20). Assim, Paulo ensina que os cristãos não devem moldar sua identidade pela cultura imperial romana, mas viver como cidadãos do reino de Cristo, mesmo que isso traga sofrimento."], "paragrafoIds": ["p13-2-0", "p13-2-1", "p13-2-2", "p13-2-3"]}, {"subtitulo": "3. Infiltração de falsos mestres", "paragrafos": ["Havia o perigo de ensinos distorcidos vindos de fora, especialmente por parte dos legalistas.", "<strong>A resposta de Paulo</strong> — Em 3:2, Paulo usa termos fortes como \"cães\" e \"maus obreiros\" para criticar aqueles que exigiam a circuncisão e o cumprimento da lei judaica como requisitos para a salvação, obscurecendo a essência do evangelho. Afirma que a verdadeira justificação vem apenas pela fé em Cristo e não pela lei. Chega a dizer que considera todo o seu currículo religioso anterior como \"esterco\" (σκύβαλον) para poder ganhar a Cristo (3:8-9)."], "paragrafoIds": ["p13-3-0", "p13-3-1"]}, {"subtitulo": "4. Libertinagem", "paragrafos": ["Por outro lado, havia aqueles que distorciam a liberdade cristã para seguir prazeres carnais. Eles compreenderam de forma equivocada a liberdade em Cristo e, por isso, seguiam os desejos da carne, buscavam os prazeres pessoais, mantinham a mente voltada para as coisas terrenas e não levavam o pecado a sério.", "<strong>A resposta de Paulo</strong> — Afirma que \"o seu deus é o estômago\" (3:19). Aqui, o \"estômago\" não se refere apenas à comida, mas pode representar o conjunto dos desejos e apetites humanos. Em outras palavras, o senhor deles não era Deus, mas os seus próprios desejos. Na perspectiva de Paulo, essas pessoas eram \"inimigos da cruz de Cristo\", porque a cruz representa negação de si mesmo, sacrifício, obediência e disposição para sofrer por Cristo. Entretanto, eles buscavam conforto, satisfaziam seus próprios desejos e viviam em função dos prazeres do presente. Por isso, seu modo de vida estava em total oposição aos valores da cruz."], "paragrafoIds": ["p13-4-0", "p13-4-1"]}, {"subtitulo": "Exegese — Filipenses 4:10-20", "paragrafos": ["Paulo explica que sua grande alegria não vinha simplesmente do fato de ter recebido ajuda financeira. Isso porque ele havia aprendido a viver contente em qualquer situação. Aqui, \"viver contente\" não significa simplesmente resignar-se e aceitar passivamente a situação presente. Então, o que significa? Vejamos dois aspectos.", "1) Paulo diz: \"aprendi\". Ou seja, não era algo com que ele nasceu nem algo que surgiu automaticamente. Ao longo de seu ministério, passando por fome, perigos de morte, açoites, prisões e muitas outras provações, ele foi aprendendo essa realidade.", "2) Pelo contexto, o significado de Filipenses 4:13 é \"Tanto na fartura quanto na escassez, tanto na fome quanto na abundância, posso perseverar porque Cristo me fortalece.\" Isso implica não fazer das circunstâncias a fonte da própria alegria, mas considerar o evangelho e o Senhor como os bens mais preciosos da vida. Sempre que suas convicções eram abaladas, Paulo voltava a reafirmar essas verdades para si mesmo. Foi assim que alcançou essa maturidade espiritual.", "Quando alguém coloca o evangelho e o Senhor acima do próprio bem-estar e satisfação, e continuamente reafirma e abraça essa prioridade como fundamento da vida, alcança uma estabilidade interior que não é destruída pelas tempestades da existência. Assim como o fundo do oceano permanece sereno mesmo quando a superfície está agitada, Paulo chegou a uma profundidade espiritual que não dependia das circunstâncias externas.", "Para Paulo, o contentamento não era a arte de tornar-se pobre nem a arte de tornar-se rico; era uma disciplina espiritual de aprender que Cristo é suficiente."], "paragrafoIds": ["p13-5-0", "p13-5-1", "p13-5-2", "p13-5-3", "p13-5-4"]}, {"subtitulo": "Observação antes de chegar a uma conclusão", "paragrafos": ["O conteúdo do texto é cristológico. No entanto, o alvo da exegese é buscar o que Paulo está dizendo aos leitores originais com o conteúdo. Ao apresentar essa cristologia, o que Paulo está dizendo aos leitores originais? Superficialmente a perícope trata de uma \"explicação doutrinária\", mas praticamente é uma exortação pastoral."], "paragrafoIds": ["p13-6-0"]}]}, {"numero": 14, "titulo": "Tito e Filemom", "secoes": [{"subtitulo": "Tito — Os problemas das igrejas em Creta e as respostas de Paulo", "paragrafos": ["1. Falsos mestres — Paulo fala de pessoas \"insubordinadas\", \"faladoras inúteis\" e \"enganadoras\" (1:10). Elas ensinavam coisas erradas e perturbavam as igrejas. Os falsos mestres em Tito parecem não ser de um único grupo ligado a uma ideologia específica, mas pessoas com diferentes origens religiosas e filosóficas. Entre eles havia os que promoviam ideias judaizantes, os que colocavam regras e tradições humanas acima do evangelho (1:14), os que ensinavam movidos pela ganância e pelo desejo de lucro e os cuja vida não correspondia ao próprio ensinamento que transmitiam.", "<strong>Resposta de Paulo</strong> — É silenciá-los, repreendê-los severamente e proteger a igreja pela sã doutrina (1:10–13). Em relação aos mestres de tendência judaizante, Paulo fala que deve evitar fábulas judaicas, genealogias e discussões sobre a Lei porque são inúteis e desviam da verdade e, em vez disso, concentrar no evangelho e na vida piedosa (1:14; 3:9).", "2. Falta de liderança madura — Paulo manda Tito estabelecer presbíteros em cada cidade de Creta (1:5), indicando que as igrejas ainda não tinham liderança organizada e espiritualmente qualificada. <strong>Resposta de Paulo</strong> — Mandou Tito estabelecer presbíteros em cada cidade quem são moralmente íntegros, maduros espiritualmente e capazes de ensinar e corrigir (1:5–9).", "κατὰ πόλιν (cada cidade) — Quando Paulo e Tito percorreram a ilha de Creta pregando o evangelho, surgiram em várias cidades da ilha grupos de pessoas que creram em Jesus, ou seja, igrejas domésticas. O fato de Paulo usar a expressão \"κατὰ πόλιν\" (\"em cada cidade\", no singular) mostra que ele não estava dizendo a Tito para nomear apenas alguns líderes para toda a ilha de Creta. Sua instrução era que Tito visitasse cuidadosamente cada uma das cidades onde já existiam comunidades cristãs e estabelecesse nelas uma liderança adequada. A tarefa era abrangente e meticulosa.", "3. Problemas morais e éticos — A carta mostra necessidade de corrigir indisciplina, preguiça, ganância e falta de domínio próprio. Paulo fala em 1:12, \"Um dentre eles, seu próprio profeta, disse: 'Os cretenses são sempre mentirosos, feras malignas, glutões preguiçosos.'\" Esta citação é tradicionalmente atribuída a Epimênides. Ele foi um poeta, profeta e filósofo cretense do século VI a.C. O contexto original da declaração parece estar relacionado à crença de alguns cretenses de que o túmulo de Zeus estava localizado em Creta. Epimênides criticava essa afirmação, pois, segundo a religião grega, Zeus era um deus imortal e não poderia ter morrido nem sido sepultado. Por isso, ele acusava os cretenses de serem \"mentirosos\". Com o passar do tempo, aproximadamente 660 anos, essa frase tornou-se amplamente conhecida de forma independente. Paulo então a utiliza em Tito 1:12 ao orientar Tito sobre como lidar com os falsos mestres, especialmente os da circuncisão, que procuravam obter lucro ensinando falsidades em vez de trabalhar. Em outras palavras, segundo Paulo, a própria identidade desses falsos mestres é bem retratada nessa citação.", "<strong>Resposta de Paulo</strong> — Paulo reconhece a influência dos falsos mestres e o resultado na vida cristã. Por isso, ensina cada grupo da igreja a viver com domínio próprio, pureza, dignidade, fidelidade e boas obras (2:1–10, 14)."], "paragrafoIds": ["p14-0-0", "p14-0-1", "p14-0-2", "p14-0-3", "p14-0-4", "p14-0-5"]}, {"subtitulo": "A igreja que Paulo desejava ver", "paragrafos": ["Na carta, a igreja que Paulo deseja não é simplesmente uma igreja com organização, mas uma igreja saudável na qual aparece uma vida digna do evangelho. Mais especificamente:", "1. Uma igreja com (sã) doutrina", "2. Uma igreja com (liderança) saudável (ou seja, qualificada, funcional, exemplar)", "3. Uma igreja em que vida e doutrina (concordam)", "4. Uma igreja zelosa de (boas) obras (2:14). Cf. a ênfase de Tiago.", "5. Uma igreja em que todas as gerações e grupos sejam (discipulados)"], "paragrafoIds": ["p14-1-0", "p14-1-1", "p14-1-2", "p14-1-3", "p14-1-4", "p14-1-5"]}, {"subtitulo": "Paulo era um conservador em favor da ordem social existente?", "paragrafos": ["Ao analisar as exortações de Paulo em 2:1-10, surge o questionamento se ele seria um conservador que apoia a ordem social vigente, mesmo que isso contradiga a verdade do evangelho que ele próprio proclamou e ensinou (cf. especialmente 2:9).", "A visão da maioria é acomodação estratégica, ou seja, Paulo recomendava a submissão às ordens sociais não por ideologia, mas como uma estratégia para a propagação do evangelho. No Império Romano, o Cristianismo era frequentemente visto como uma \"religião perigosa\" que subvertia a ordem doméstica. Nesse ambiente, incentivava os cristãos a serem cidadãos exemplares para impedir que \"a palavra de Deus fosse blasfemada\" (2:5, 10; 3:1). Trata-se de uma adaptação diplomática para remover barreiras ao evangelismo.", "Por que Paulo dedicou mais esforços à proclamação do evangelho do que à reforma social? Paulo não era indiferente aos problemas sociais. Em suas cartas, ele ensinou princípios que desafiavam barreiras étnicas, sociais e econômicas, promovendo o amor, a igualdade espiritual e o respeito mútuo entre os cristãos. Mesmo assim, seu foco principal era a pregação do evangelho, porque:", "1) Entendia que sua principal vocação era proclamar o evangelho de Cristo. Em vez de atuar como um reformador político ou social, ele acreditava que foi chamado para pregar o evangelho de Cristo.", "2) Acreditava que a transformação mais profunda da sociedade começa pela transformação do ser humano por meio do evangelho. Para Paulo, a raiz dos problemas humanos estava no pecado. Por isso, ele não considerava que a simples mudança das estruturas sociais pudesse resolver o problema da humanidade. Primeiro, as pessoas precisavam ser reconciliadas com Deus e transformadas em Cristo; então seus relacionamentos, suas comunidades e, consequentemente, a própria sociedade seriam transformados.", "De fato, ele se dedicou a essa missão, viveu de acordo com ela e mudanças reais ocorreram nos lugares onde atuou. Contudo, por que a capacidade da igreja de transformar a sociedade parece tão fraca atualmente?", "3) Entendia que a Parusia chegaria logo, possivelmente antes de sua morte. Dentro de sua perspectiva escatológica, priorizou a proclamação do evangelho para a salvação dos pecadores, em vez de dedicar seus esforços à reforma social e político."], "paragrafoIds": ["p14-2-0", "p14-2-1", "p14-2-2", "p14-2-3", "p14-2-4", "p14-2-5", "p14-2-6"]}, {"subtitulo": "O desenvolvimento da expectativa escatológica de Paulo quanto ao tempo da Parusia", "paragrafos": ["1. Durante sua própria vida — a. 1 Tessalonicenses 4:15–17. b. Nas cartas mais antigas dele percebe-se um forte senso de urgência escatológica, isto é, a expectativa de que o fim estava próximo.", "2. Depois de sua morte — a. Filipenses 1:20–24. b. Paulo também reconhecia a possibilidade de sua morte antes da Parusia. Em 2 Coríntios 5:1–8, Paulo expressa sua esperança para além da morte.", "3. Uma postura mais cautelosa nas cartas posteriores — a. Nas cartas geralmente consideradas posteriores de Paulo, observa-se uma preocupação crescente com a continuidade da vida da igreja, a formação de líderes e a preservação da sã doutrina, mais do que com a iminência imediata da volta de Cristo."], "paragrafoIds": ["p14-3-0", "p14-3-1", "p14-3-2"]}, {"subtitulo": "O significado de ἔργον ἀγαθόν (boas obras)", "paragrafos": ["Na carta, a expressão \"boas obras\" foi usada 6 vezes (1:16; 2:7, 14; 3:1, 8, 14). Na carta significa \"o fruto e a evidência inevitável da salvação que deve se manifestar na vida dos cristãos\". Embora em outras epístolas paulinas o termo \"obras\" (ἔργα) seja frequentemente tratado de forma negativa (ex: obras da Lei), em Tito é usado de maneira positiva e enfática como uma marca essencial da identidade cristã.", "O significado específico desse conceito no contexto de Tito pode ser resumido em três pontos principais:", "1) São o propósito da salvação e a resposta à graça. Paulo deixa claro que as boas obras não são a condição para a salvação, mas sim o propósito dela. 2:14 diz \"...o qual a si mesmo se deu por nós, a fim de nos remir de toda iniquidade e purificar, para si mesmo, um povo exclusivamente seu, zeloso de boas obras.\" Ou seja, o próprio motivo de Jesus ter nos remido na cruz foi criar um povo zeloso por boas obras. As boas obras não são opcionais, mas um resultado natural e necessário.", "2) São o distintivo contra os falsos mestres. Na época em que Tito foi escrita, a ilha de Creta tinha falsos mestres que falavam muito, mas cujas vidas não correspondiam ao que pregavam. Paulo apresenta as boas obras como a pedra de toque para distinguir a verdadeira fé da falsa. Veja 1:16 — \"No tocante a Deus, professam conhecê-lo; entretanto, o negam por suas obras; por isso, são abomináveis, desobedientes e reprovados para toda boa obra.\" Não importa o quanto alguém confesse a fé com os lábios; se o fruto das boas obras (ἔργον ἀγαθόν) não aparecer na vida prática, trata-se de uma advertência severa sobre a falsidade dessa fé (cf. soteriologia de Tiago).", "3) São a responsabilidade concreta e prática com a comunidade e a sociedade. As boas obras em Tito não permanecem em uma esfera puramente abstrata ou religiosa, mas apontam para áreas muito cotidianas e sociais. Em relações sociais, Paulo exorta a todos que se sujeitem aos governantes e autoridades, que sejam obedientes e estejam prontos para toda boa obra, que não difamem a ninguém, mas sejam pacíficos e cordiais. Agora, na assistência prática dentro da comunidade cristã, Paulo exorta em 3:14, \"Além disso, os nossos que aprendam também a se dedicar às boas obras, a fim de suprir as necessidades urgentes, ...\". Isto significa assistência material e financeira aos ministérios da igreja.", "Em resumo, ἔργον ἀγαθόν na carta trata-se da expressão visível e do fruto da graça, manifestando-se em seus ambientes cotidianos (família, igreja e sociedade)."], "paragrafoIds": ["p14-4-0", "p14-4-1", "p14-4-2", "p14-4-3", "p14-4-4", "p14-4-5"]}, {"subtitulo": "3:10 — aquele que provoca divisões (αἱρετικὸν ἄνθρωπον)", "paragrafos": ["O significado original de αἱρετικὸν ἄνθρωπον é alguém que cria divisões ou causador de partidos e divisões na comunidade. Posteriormente começou a ter o sentido de \"heresia\" desenvolvido na história da igreja.", "Na carta a Tito, que tipo de problema isso indica? No contexto (3:9–11), Paulo manda evitar discussões tolas, genealogias, contendas e debates sobre a Lei. Portanto, o \"homem faccioso (αἱρετικὸν ἄνθρωπον)\" provavelmente é alguém que leva a igreja a discussões intermináveis e divisões. Ou seja, é um conceito um pouco diferente da ideia posterior de heresia doutrinária sistemática, como negação da Trindade ou heresias cristológicas. Em Tito 3:10, αἱρετικὸν ἄνθρωπον não significa heresia doutrinária no sentido moderno, mas uma pessoa divisiva que destrói a comunidade por meio de ensinos errados e discussões facciosas."], "paragrafoIds": ["p14-5-0", "p14-5-1"]}, {"subtitulo": "Filemom — Propósito", "paragrafos": ["É pedir a Filemom: 1. perdoar e receber Onésimo como irmão em Cristo (vv. 15-16). 2. Lhe mandar de volta a Paulo para seu ministério em Roma (v. 13-14)."], "paragrafoIds": ["p14-6-0"]}]}, {"numero": 15, "titulo": "1 Timóteo", "secoes": [{"subtitulo": "Os problemas da igreja de Éfeso", "paragrafos": ["1. Falsas doutrinas — Paulo ordena a Timóteo \"ordene a certas pessoas que não ensinem doutrinas diferentes\" (1:3). Ou seja, já existiam em Éfeso ensinamentos diferentes do evangelho e distorções da fé.", "2. Mitos e genealogias intermináveis — Paulo escreve \"nem se ocupem com mitos e genealogias sem fim\" (1:4). Isso provavelmente estava ligado a tradições judaicas, especulações sobre genealogias angelicais e histórias místicas. Essas coisas produziam discussões e confusão, em vez de promover o evangelho.", "3. Uso errado da Lei — Alguns queriam ser mestres da Lei, mas nem entendiam corretamente o que ensinavam (1:7). Assim, a igreja estava se inclinando para legalismo, religiosidade baseada em regras e falsa piedade centrada na Lei.", "4. Discussões inúteis e debates — Parece que havia na igreja debates vazios, discussões intermináveis e disputas intelectuais. Paulo adverte repetidamente contra \"palavras vazias\", \"controvérsias\" e \"discussões\". Ou seja, a igreja estava se tornando uma comunidade de debates, em vez de uma comunidade centrada na prática do evangelho.", "5. Ascetismo — Mais adiante, Paulo menciona pessoas que proibiam o casamento e certos alimentos (4:1-3). A ideia era algo como \"a matéria é má\" e \"quanto mais o corpo for reprimido, mais santo alguém se torna\".", "6. Uso da piedade para lucro — Paulo critica pessoas que \"pensam que a piedade é fonte de lucro\" (6:5). Ou seja, alguns líderes estavam usando autoridade espiritual, influência religiosa e ensino para obter vantagens financeiras. Paulo adverte fortemente contra ganância e amor ao dinheiro.", "7. Problemas de liderança — A estrutura de liderança da igreja também parecia estar enfraquecida. Por isso, no capítulo 3, Paulo descreve detalhadamente as qualificações de presbíteros e diáconos. O foco principal é caráter, mais do que habilidade. Isso sugere a presença de líderes imaturos, líderes problemáticos e pessoas abusando da autoridade.", "8. Problemas no culto e na vida comunitária — Paulo também dá instruções detalhadas sobre oração, comportamento de homens e mulheres, ensino e vida comunitária. Isso indica que havia desordem, confusão e comportamentos inadequados na igreja e no culto público."], "paragrafoIds": ["p15-0-0", "p15-0-1", "p15-0-2", "p15-0-3", "p15-0-4", "p15-0-5", "p15-0-6", "p15-0-7"]}, {"subtitulo": "As respostas de Paulo", "paragrafos": ["Para lidar com esses problemas, o que Paulo fez em 1 Timóteo? Ele faz duas coisas: ensinar eclesiologia (a doutrina da igreja) e dar instruções pastorais sobre como lidar com esses problemas. As instruções pastorais de Paulo não são independentes da sua eclesiologia, mas fluem dela. Entretanto, essas duas coisas aparecem misturadas ao longo da carta.", "A eclesiologia de 1 Timóteo não é apresentada de forma abstrata, mas de maneira contextualizada, visando atender ao propósito da carta. O que Paulo diz a Timóteo sobre os 8 problemas da igreja de Éfeso?", "1. Falsas doutrinas — Paulo ordena que Timóteo impeça ensinamentos diferentes do evangelho e preserve a sã doutrina, ou seja, proteger a igreja da corrupção teológica (1:3–7; 4:1–7; 6:3–5).", "2. Mitos e genealogias intermináveis — Timóteo deve impedir especulações inúteis e discussões sem proveito espiritual e manter o foco na fé e na edificação (1:4; 4:7).", "3. Uso errado da Lei — Paulo explica que a Lei é boa quando usada corretamente, mas não foi dada como meio de salvação. Sua função é revelar o pecado e conduzir as pessoas ao evangelho. Portanto, o aragrafoIds": ["p16-0-0", "p16-0-1"]}, {"subtitulo": "Escrituras em 2 Timóteo 3:15-16", "paragrafos": ["3:15 — καὶ ὅτι ἀπὸ βρέφους τὰ ἱερὰ γράμματα οἶδας, τὰ δυνάμενά σε σοφίσαι εἰς σωτηρίαν διὰ πίστεως τῆς ἐν Χριστῷ Ἰησοῦ.", "3:16 — πᾶσα γραφὴ θεόπνευστος καὶ ὠφέλιμος πρὸς διδασκαλίαν, πρὸς ἐλεγμόν, πρὸς ἐπανόρθωσιν, πρὸς παιδείαν τὴν ἐν δικαιοσύνῃ.", "Os referentes das palavras \"Escritura\" (γράμματα, τὰ e γραφή) em 3:15-16 provavelmente não são exatamente os mesmos. Vamos ver um por um.", "3:15a — \"desde a infância conheces as Sagradas Letras\" (ἀπὸ βρέφους τὰ ἱερὰ γράμματα οἶδας). Aqui Paulo faz referência à infância de Timóteo. Timóteo recebeu sua formação religiosa de sua mãe e de sua avó (2Tm 1:5). Portanto, a expressão τὰ ἱερὰ γράμματα refere-se ao Antigo Testamento.", "3:15b — \"as quais podem tornar-te sábio para a salvação mediante a fé em Cristo Jesus\" (τὰ δυνάμενά σε σοφίσαι εἰς σωτηρίαν διὰ πίστεως τῆς ἐν Χριστῷ Ἰησοῦ). Aqui a situação se torna um pouco diferente. Paulo continua falando do Antigo Testamento (τὰ — pronome relativo, cujo antecedente é ἱερὰ γράμματα em 3:15a), mas agora do Antigo Testamento interpretado à luz de Cristo. Em outras palavras, o referente do pronome relativo (τὰ) continua sendo o Antigo Testamento. O quadro hermenêutico, porém, é o evangelho apostólico. Por isso, em sentido funcional, trata-se do Antigo Testamento interpretado segundo o evangelho apostólico e centrado em Cristo. Aqui já podemos observar a mudança da visão paulina das Escrituras, passando da concepção judaica das Escrituras para a concepção cristã das Escrituras.", "3:16 — \"...Toda Escritura é inspirada por Deus...\" (πᾶσα γραφὴ θεόπνευστος). Esta é a expressão mais difícil de interpretar. A pergunta é o que Paulo tinha em mente quando escreveu \"toda Escritura\"? Somente o Antigo Testamento? O Novo Testamento não está incluído? Segundo a posição mais conservadora, Paulo já reconhecia alguns escritos cristãos como Escritura, pois em 1 Timóteo 5:18, Paulo introduz duas citações com a fórmula \"a Escritura diz\", citando Deuteronômio 25:4 e Lucas 10:7. Em 2 Pedro 3:16, as cartas de Paulo são colocadas ao lado das \"demais Escrituras\" (γραφαί). Isso sugere que algumas tradições e escritos apostólicos já começavam a ser tratados com autoridade escriturística durante o período do Novo Testamento.", "O cânon do Novo Testamento foi de fato consolidado no final do século IV (aproximadamente entre 367 e 397 d.C.), na forma atual de 27 livros. No entanto, sua autoridade e uso já haviam começado a se desenvolver desde o período da igreja do século I."], "paragrafoIds": ["p16-1-0", "p16-1-1", "p16-1-2", "p16-1-3", "p16-1-4", "p16-1-5", "p16-1-6"]}]}]

function ring(pct, size) {
  size = size || 34;
  const r = (size - 4) / 2;
  const c = 2 * Math.PI * r;
  const offset = c - (pct / 100) * c;
  return `<div class="ring-wrap" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle class="ring-bg" cx="${size/2}" cy="${size/2}" r="${r}"></circle>
      <circle class="ring-fg" cx="${size/2}" cy="${size/2}" r="${r}" stroke-dasharray="${c}" stroke-dashoffset="${offset}"></circle>
    </svg>
    <span class="ring-label">${Math.round(pct)}%</span>
  </div>`;
}

function getParagrafoTexto(licaoNum, paragrafoId) {
  const licao = MATERIA.find(l => l.numero === licaoNum);
  if (!licao) return null;
  for (const secao of licao.secoes) {
    const idx = (secao.paragrafoIds || []).indexOf(paragrafoId);
    if (idx !== -1) return { texto: secao.paragrafos[idx], subtitulo: secao.subtitulo };
  }
  return null;
}

function showFonteModal(licaoNum, paragrafoIds) {
  const licao = MATERIA.find(l => l.numero === licaoNum);
  if (!licao) return;

  const trechos = paragrafoIds
    .map(pid => getParagrafoTexto(licaoNum, pid))
    .filter(Boolean);

  const modalHtml = `<div class="modal-overlay" id="fonte-modal-overlay" onclick="if(event.target===this) closeFonteModal()">
    <div class="modal-box">
      <div class="modal-header">
        <div>
          <div class="modal-header-text">Trecho do material de estudo</div>
          <div class="modal-header-sub">Aula ${licao.numero} — ${licao.titulo}</div>
        </div>
        <button class="modal-close" onclick="closeFonteModal()">✕</button>
      </div>
      <div class="modal-body">
        ${trechos.map(t => `<p class="modal-paragrafo">${t.texto}</p>`).join('')}
      </div>
      <div class="modal-footer">
        <button class="modal-link-btn" onclick='goToFonteInMaterial(${licao.numero}, ${JSON.stringify(paragrafoIds)})'>Abrir na Aula ${licao.numero} →</button>
      </div>
    </div>
  </div>`;

  const container = document.createElement('div');
  container.id = 'fonte-modal-container';
  container.innerHTML = modalHtml;
  document.body.appendChild(container);
}

function closeFonteModal() {
  const el = document.getElementById('fonte-modal-container');
  if (el) el.remove();
}

function goToFonteInMaterial(licaoNum, paragrafoIds) {
  closeFonteModal();
  // Salva de onde o usuário veio, para poder voltar exatamente para lá
  if (view === 'simulado') {
    returnTo = { view: 'simulado', simIdx: currentSim };
    salvarProgressoAtual();
  } else if (view === 'dissertativas') {
    returnTo = { view: 'dissertativas' };
  }
  const idx = MATERIA.findIndex(l => l.numero === licaoNum);
  if (idx === -1) return;
  renderLicao(idx, paragrafoIds);
  setTimeout(() => {
    const firstId = paragrafoIds[0];
    const el = document.getElementById(firstId);
    if (el && typeof el.scrollIntoView === 'function') el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 80);
}

function voltarParaOrigem() {
  if (!returnTo) return renderHome();
  const destino = returnTo;
  returnTo = null; // limpa o ponto de retorno — respostas e progresso continuam intactos em `respostas`
  if (destino.view === 'simulado') {
    view = 'simulado';
    currentSim = destino.simIdx;
    renderSim();
  } else if (destino.view === 'dissertativas') {
    renderDissertativas();
  } else {
    renderHome();
  }
}

  </div>`;

  html += `<a class="materia-pdf-link" href="https://drive.google.com/file/d/1XT4rkPUBySrwLtMGY3vh6dPE8lbU5Y30/view?usp=drive_link" target="_blank" rel="noopener">
    <span class="materia-pdf-icon">${ICON_DOWNLOAD}</span>
    <span class="materia-pdf-text">Se preferir, <strong>baixe o PDF completo</strong> desse link</span>
  </a>`;

  html += '<div class="materia-toc">';
  MATERIA.forEach((licao, idx) => {
    html += `<button class="materia-toc-item" onclick="renderLicao(${idx})">
      <span class="materia-toc-num">
        <span class="materia-toc-num-label">Aula</span>
        <span class="materia-toc-num-value">${licao.numero}</span>
      </span>
      <span class="materia-toc-text">
        <span class="materia-toc-titulo">${licao.titulo}</span>
      </span>
      <span class="materia-toc-arrow">${ICON_ARROW}</span>
    </button>`;
  });
  html += '</div>';

  html += '</div>';
  document.getElementById('root').innerHTML = html;
}

function renderLicao(idx, highlightIds) {
  view = 'licao';
  currentLicao = idx;
  const licao = MATERIA[idx];
  if (!licao) return renderMateriaIndex();

  let html = `<div class="topbar">
    <div class="topbar-left"><span class="topbar-title">Aula ${licao.numero} — ${licao.titulo}</span></div>
    <div class="topbar-right">
      ${returnTo ? `<button class="btn-pill accent" onclick="voltarParaOrigem()">${ICON_ARROW_LEFT} Voltar à questão</button>` : ''}
      <button class="btn-pill" onclick="renderMateriaIndex()">📖 Aulas</button>
      <button class="btn-pill" onclick="renderHome()">Início</button>
    </div>
  </div>`;

  html += '<div class="wrap">';

  html += '<div class="licao-nav">';
  MATERIA.forEach((l, i) => {
    html += `<button class="licao-nav-btn ${i===idx?'active':''}" onclick="renderLicao(${i})">${l.numero}</button>`;
  });
  html += '</div>';

  html += `<div class="page-head">
    <span class="page-eyebrow">Aula ${licao.numero}</span>
    <h1 class="page-title">${licao.titulo}</h1>
  </div>`;

  licao.secoes.forEach(secao => {
    html += `<div class="licao-secao">
      <h3 class="licao-subtitulo">${secao.subtitulo}</h3>
      ${secao.paragrafos.map((p, pIdx) => {
        const pid = secao.paragrafoIds ? secao.paragrafoIds[pIdx] : null;
        const isHighlighted = highlightIds && pid && highlightIds.includes(pid);
        return `<p class="licao-paragrafo ${isHighlighted?'highlighted':''}" ${pid?`id="${pid}"`:''}>${p}</p>`;
      }).join('')}
    </div>`;
  });

  const prevIdx = idx - 1;
  const nextIdx = idx + 1;
  const hasPrev = prevIdx >= 0;
  const hasNext = nextIdx < MATERIA.length;

  html += `<div class="licao-footer-nav">
    <button class="licao-footer-btn" onclick="renderLicao(${prevIdx})" ${!hasPrev?'disabled':''}>
      ← ${hasPrev ? 'Aula ' + MATERIA[prevIdx].numero : 'Anterior'}
    </button>
    <button class="licao-footer-btn" onclick="renderLicao(${nextIdx})" ${!hasNext?'disabled':''}>
      ${hasNext ? 'Aula ' + MATERIA[nextIdx].numero : 'Próxima'} →
    </button>
  </div>`;

  html += '</div>';
  document.getElementById('root').innerHTML = html;
}

function salvarProgressoAtual() {
  // Só salva se estávamos de fato vendo um simulado (evita salvar lixo na primeira chamada)
  if (view === 'simulado') {
    progressoPorSimulado[currentSim] = {
      respostas: { ...respostas },
      corrigido: corrigido
    };
  }
}

function startSim(idx) {
  salvarProgressoAtual();
  view = 'simulado';
  currentSim = Number(idx);
  returnTo = null;

  const salvo = progressoPorSimulado[currentSim];
  if (salvo) {
    respostas = { ...salvo.respostas };
    corrigido = salvo.corrigido;
  } else {
    respostas = {};
    corrigido = false;
  }
  renderSim();
}

function reiniciarSimulado() {
  if (!window.confirm('Isso vai apagar suas respostas deste simulado. Tem certeza que quer recomeçar do zero?')) return;
  delete progressoPorSimulado[currentSim];
  respostas = {};
  corrigido = false;
  renderSim();
}

function setResp(key, val) {
  respostas[key] = val;
  if (view === 'simulado' && !corrigido) updateTopbarRing();
  salvarProgressoAtual();
}

function countAnswered() {
  const sim = SIMULADOS[currentSim];
  if (!sim) return {done:0,total:0};
  let total = 0, done = 0;
  (sim.dados.lacunas||[]).forEach(q => {
    total++;
    if ((respostas['l_'+q.numero]||'').trim()) done++;
  });
  (sim.dados.multipla||[]).forEach(q => {
    total++;
    if ((respostas['m_'+q.numero]||[]).length) done++;
  });
  return {done, total};
}

function updateTopbarRing() {
  const {done, total} = countAnswered();
  const pct = total ? (done/total*100) : 0;
  const ringEl = document.getElementById('progress-ring-container');
  if (ringEl) ringEl.innerHTML = ring(pct, 30);
}

function toggleAlt(qNum, letra, modo) {
  if (corrigido) return;
  const key = 'm_' + qNum;
  const cur = respostas[key] || [];
  if (modo === 'unica') {
    respostas[key] = [letra];
  } else {
    if (cur.includes(letra)) respostas[key] = cur.filter(l => l !== letra);
    else respostas[key] = [...cur, letra];
  }
  salvarProgressoAtual();
  renderSim();
}

function toggleGab(num) {
  const box = document.getElementById('gab_' + num);
  if (box) box.classList.toggle('visible');
}

function corrigir() {
  corrigido = true;
  salvarProgressoAtual();
  renderSim();
  window.scrollTo({top:0,behavior:'smooth'});
}

function calcScore() {
  const sim = SIMULADOS[currentSim];
  if (!sim) return {lac:0,totalLac:0,mult:0,totalMult:0};
  let lac=0,tLac=0,mult=0,tMult=0;
  (sim.dados.lacunas||[]).forEach(q => {
    tLac++;
    const val = (respostas['l_'+q.numero]||'').trim().toLowerCase();
    const resp = (q.resposta||'').toLowerCase();
    if (val && resp && (val === resp || val.includes(resp.slice(0,4)))) lac++;
  });
  (sim.dados.multipla||[]).forEach(q => {
    tMult++;
    const sel = respostas['m_'+q.numero] || [];
    const corretas = (q.alternativas||[]).filter(a=>a.correta).map(a=>a.letra);
    if (sel.length===corretas.length && corretas.every(c=>sel.includes(c))) mult++;
  });
  return {lac,totalLac:tLac,mult,totalMult:tMult};
}

function renderSim() {
  const sim = SIMULADOS[currentSim];
  if (!sim) return renderHome();
  const sc = calcScore();
  const totalObj = sc.totalLac + sc.totalMult;
  const acObj = sc.lac + sc.mult;
  const {done, total} = countAnswered();
  const progressPct = total ? (done/total*100) : 0;

  let html = `<div class="topbar">
    <div class="topbar-left">
      ${!corrigido ? `<span id="progress-ring-container">${ring(progressPct, 30)}</span>` : `<div class="completed-badge">${ICON_CHECK}</div>`}
      <span class="topbar-title">Simulado ${sim.numero}</span>
    </div>
    <div class="topbar-right">
      <select class="select-pill" onchange="startSim(this.value)">
        ${SIMULADOS.map((s,i)=>`<option value="${i}" ${i===currentSim?'selected':''}>Simulado ${s.numero}</option>`).join('')}
      </select>
      <button class="btn-pill" onclick="reiniciarSimulado()" title="Apagar respostas e recomeçar este simulado">${ICON_RESET} Reiniciar</button>
      <button class="btn-pill" onclick="renderDissertativas()">Dissertativas</button>
      <button class="btn-pill" onclick="renderHome()">Início</button>
    </div>
  </div>`;

  html += '<div class="wrap">';

  if (corrigido) {
    const pMult = sc.totalMult ? Math.round(sc.mult/sc.totalMult*100) : 0;
    const pLac = sc.totalLac ? Math.round(sc.lac/sc.totalLac*100) : 0;
    html += `<div class="placar">
      <div class="placar-top">
        <div class="placar-icon">${ICON_CHECK}</div>
        <div>
          <div class="placar-titulo">Resultado das objetivas</div>
          <div class="placar-sub">As dissertativas têm gabarito próprio — acesse pelo menu acima</div>
        </div>
      </div>
      <div class="placar-row">
        <span class="placar-row-label">Múltipla escolha</span>
        <div class="placar-bar-wrap"><div class="placar-bar bar-mult" style="width:${pMult}%"></div></div>
        <span class="placar-score">${sc.mult}<small>/${sc.totalMult}</small></span>
      </div>
      <div class="placar-row">
        <span class="placar-row-label">Lacunas</span>
        <div class="placar-bar-wrap"><div class="placar-bar bar-lac" style="width:${pLac}%"></div></div>
        <span class="placar-score">${sc.lac}<small>/${sc.totalLac}</small></span>
      </div>
      <div class="placar-total">
        <span class="placar-total-label">Total de acertos</span>
        <span class="placar-total-value">${acObj} / ${totalObj}</span>
      </div>
    </div>`;
  } else {
    html += `<div class="page-head">
      <span class="page-eyebrow">Simulado ${sim.numero} de ${SIMULADOS.length}</span>
      <h1 class="page-title">Lacunas &amp; Múltipla escolha</h1>
      <p class="page-sub">${done} de ${total} questões respondidas</p>
    </div>`;
  }

  html += '<div class="section-label">Preencher os espaços <span class="count">' + (sim.dados.lacunas||[]).length + '</span></div>';
  html += '<p class="section-hint">Complete com o termo correto.</p>';
  (sim.dados.lacunas||[]).forEach(q => {
    const val = respostas['l_'+q.numero] || '';
    const partes = q.enunciado.split(/\(\s*_____\s*\)/);
    let status = '';
    if (corrigido && val.trim()) {
      const correct = val.trim().toLowerCase().includes((q.resposta||'').toLowerCase().slice(0,4));
      status = correct ? 'correct' : 'incorrect';
    }
    html += `<div class="card ${status}">
      <div class="q-head">
        <span class="q-num">${q.numero}</span>
        <div class="lacuna-wrap">
          ${partes[0]}<input type="text" class="lacuna-input ${corrigido&&val?(status==='correct'?'ok':'err'):''}" value="${val}" ${corrigido?'disabled':''} placeholder="___" onchange="setResp('l_${q.numero}',this.value)" oninput="setResp('l_${q.numero}',this.value)" />${partes[1]||''}
        </div>
      </div>
      ${corrigido ? `<p class="gab-lacuna visible ${status==='correct'?'ok':'err'}">${status==='correct'?ICON_CHECK+' Correto!':ICON_X+' Resposta: '+q.resposta}</p>` : ''}
      ${corrigido && q.fonte ? `<button class="btn-fonte" onclick='showFonteModal(${q.fonte.licao}, ${JSON.stringify(q.fonte.paragrafoIds)})'>📖 Ver no material</button>` : ''}
    </div>`;
  });

  html += '<div class="section-label">Múltipla escolha <span class="count">' + (sim.dados.multipla||[]).length + '</span></div>';
  html += '<p class="section-hint">Algumas questões pedem mais de uma alternativa.</p>';
  (sim.dados.multipla||[]).forEach(q => {
    const sel = respostas['m_'+q.numero] || [];
    html += `<div class="card">
      <div class="q-head">
        <span class="q-num">${q.numero}</span>
        <div>
          <p class="q-enunciado">${q.enunciado}</p>
          ${q.instrucao_local ? `<p class="q-instrucao">${q.instrucao_local}</p>` : ''}
        </div>
      </div>
      <div class="alt-list">
        ${(q.alternativas||[]).map(alt => {
          let cls = sel.includes(alt.letra) ? 'sel' : '';
          let badge = '';
          if (corrigido) {
            if (alt.correta && sel.includes(alt.letra)) { cls='acerto'; badge=`<span class="alt-badge" style="color:var(--green)">${ICON_CHECK}</span>`; }
            else if (alt.correta && !sel.includes(alt.letra)) { cls='perdida'; badge=`<span class="alt-badge" style="color:var(--amber)">${ICON_ARROW}</span>`; }
            else if (!alt.correta && sel.includes(alt.letra)) { cls='errada'; badge=`<span class="alt-badge" style="color:var(--red)">${ICON_X}</span>`; }
          }
          return `<button class="alt ${cls}" onclick="toggleAlt(${q.numero},'${alt.letra}','${q.modo||'unica'}')" ${corrigido?'style="cursor:default"':''}>
            <span class="alt-letra">${alt.letra}</span>
            <span class="alt-texto">${alt.texto}</span>
            ${badge}
          </button>`;
        }).join('')}
      </div>
      ${corrigido && q.fonte ? `<button class="btn-fonte" onclick='showFonteModal(${q.fonte.licao}, ${JSON.stringify(q.fonte.paragrafoIds)})'>📖 Ver no material</button>` : ''}
    </div>`;
  });

  if (!corrigido) {
    html += `<div class="action-card">
      <p>${done < total ? `Faltam ${total - done} questões para concluir.` : 'Tudo respondido — hora de corrigir!'}</p>
      <button class="btn-block btn-success" onclick="corrigir()">Corrigir prova</button>
    </div>`;
  } else {
    html += `<div class="action-card">
      <div class="action-row">
        ${currentSim < SIMULADOS.length-1 ? `<button class="btn-block btn-primary" onclick="startSim(${currentSim+1})">Próximo simulado →</button>` : ''}
        <button class="btn-block btn-ghost" onclick="renderHome()">Voltar ao início</button>
      </div>
    </div>`;
  }

  html += '</div>';
  document.getElementById('root').innerHTML = html;
}

renderHome();
</script>
</body>
</html>
